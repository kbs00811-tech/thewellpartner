services:
  - type: web
    name: thewellpartner-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_API_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://thewellpartner.com,https://www.thewellpartner.com,https://thewellpartner.vercel.app
    healthCheckPath: /health
